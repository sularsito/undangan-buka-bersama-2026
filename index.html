<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Undangan Buka Puasa Bersama</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script src="https://kit.fontawesome.com/your-code.js" crossorigin="anonymous"></script>
</head>
<body>

    <audio id="bgMusic" loop>
        <source src="assets/takbiran.mp3" type="audio/mpeg">
    </audio>

    <div id="overlay" onclick="startInvitation()">
        <div class="overlay-content">
            <h1>Ramadan Kareem</h1>
            <p>Undangan Buka Puasa Bersama</p>
            <button>Buka Undangan</button>
        </div>
    </div>

    <div class="slideshow-container">
        
        <div class="mySlides fade">
            <section id="home" class="hero">
                <div class="content">
                    <h2>Buka Puasa Bersama</h2>
                    <p class="date">Ramadan 1447H / 2026</p>
                </div>
            </section>
        </div>

        <div class="mySlides fade">
            <section id="details" class="details">
                <div class="container">
                    <h3>Waktu & Lokasi</h3>
                    <div class="info-card">
                        <p><strong>Tanggal:</strong> Sabtu, 21 Maret 2026</p>
                        <p><strong>Jam:</strong> 17.00 WIB - Selesai</p>
                        <p><strong>Tempat:</strong> Rumah Mba Sri, Cipondoh Tangerang</p>
                    </div>
                </div>
            </section>
        </div>

        <div class="mySlides fade">
            <section id="gallery" class="gallery">
                <h3>Galeri Momen</h3>
                <div class="grid">
                    <img src="assets/family1.jpg" alt="Foto 1">
                    <img src="assets/family2.jpg" alt="Foto 2">
                    <img src="assets/family3.jpg" alt="Foto 3">
                </div>
            </section>
        </div>

        <div class="dot-container">
            <span class="dot"></span> 
            <span class="dot"></span> 
            <span class="dot"></span> 
        </div>

    </div> <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="script.js"></script> 
</body>
</html>
