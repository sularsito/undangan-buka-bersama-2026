<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Undangan Buka Puasa Bersama</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script src="https://kit.fontawesome.com/your-code.js" crossorigin="anonymous"></script>
</head>
<body>

    <audio id="bgMusic" loop>
        <source src="assets/music.mp3" type="audio/mpeg">
    </audio>

    <div id="overlay" onclick="startInvitation()">
        <div class="overlay-content">
            <h1>Ramadan Kareem</h1>
            <p>Undangan Buka Puasa Bersama</p>
            <button>Buka Undangan</button>
        </div>
    </div>

    <section id="home" class="hero">
        <div class="content" data-aos="fade-up">
            <h2>Buka Puasa Bersama</h2>
            <p class="date">Ramadan 1447H / 2026</p>
        </div>
    </section>

    <section id="details" class="details">
        <div class="container" data-aos="fade-right">
            <h3>Waktu & Lokasi</h3>
            <div class="info-card">
                <p><strong>Tanggal:</strong> Sabtu, 21 Maret 2026</p>
                <p><strong>Jam:</strong> 17.00 WIB - Selesai</p>
                <p><strong>Tempat:</strong> Resto Rasa Nusantara, Tangerang</p>
            </div>
        </div>
    </section>

    <section id="gallery" class="gallery">
        <h3 data-aos="fade-up">Galeri Momen</h3>
        <div class="grid">
            <img src="assets/foto1.jpg" alt="Foto 1" data-aos="zoom-in">
            <img src="assets/foto2.jpg" alt="Foto 2" data-aos="zoom-in" data-aos-delay="100">
            <img src="assets/foto3.jpg" alt="Foto 3" data-aos="zoom-in" data-aos-delay="200">
        </div>
    </section>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="script.js"></script>
</body>
</html>
